# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/

# Set DP-1 to the max resolution of the screen

# Set HDMI-1 to 4K, 30Hz, 2x scaling
# Position it to the center top of the screen
# monitor=,preferred,auto,auto
monitor = eDP-1, disable
monitor = HDMI-A-2, preferred, auto, 1.666667

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun
# $browser = zen
$browser = google-chrome-stable --enable-features=UseOzonePlatform --ozone-platform=wayland --enable-wayland-ime --proxy-server="http://127.0.0.1:7897"
$code = code --ozone-platform=wayland


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
exec-once = $browser
# exec-once = nm-applet &
exec-once = waybar
exec-once = hypridle
exec-once = hyprpaper
exec-once = fcitx5 -d
exec-once = clash-verge

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

exec-once = systemctl --user start hyprpolkitagent

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,rose-pine-hyprcursor

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# fcitx5
env = GTK_IM_MODULE, fcitx5
env = QT_IM_MODULE, fcitx5
env = XMODIFIERS,@im=fcitx5

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 10, 5 , 4, 5

    border_size = 4
    no_border_on_floating = false # Set to true to disable borders on floating windows

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # Set as orange -> gray -> orange
    # orange = rgba(ff7f00ff)
    # gray = rgba(595959aa)
    col.active_border = rgba(ffffffff) rgba(aaaaaaff) rgba(000000ff) rgba(aaaaaaff) rgba(ffffffff) 45deg
    col.inactive_border = rgba(aaaaaa99) rgba(00000000) rgba(aaaaaa99) 45deg

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true
    extend_border_grab_area = 25
    hover_icon_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    # (str) -> master / dwindle
    # master: master-slave layout
    # dwindle: binary tree layout
    layout = dwindle

    # Set to true to disable focus fallback on windows that are not in the current workspace
    no_focus_fallback = true

    snap {
        enabled = true
        window_gap = 20
        monitor_gap = 20
        border_overlap = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.95
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.10
    dim_special = 0.8

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696

        # for optimization
        new_optimizations = true
        xray = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {

    # animate_manual_resizes = true # Enable animation when resizing windows manually
    # animate_mouse_windowdragging = true # Enable animation when dragging windows with the mouse

    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    # background_color = 0x2e3440

    mouse_move_enables_dpms = true  # 移动鼠标唤醒
    key_press_enables_dpms = false  # 避免误触唤醒

    disable_autoreload = true # Disable autoreload on config changes

    allow_session_lock_restore = true # Allow restoring session on lock/unlock

    vfr = true # Enable VFR (Variable Frame Rate) for smoother animations
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    # Remap `Caps Lock` to `Esc` on tap and `Ctrl` on hold
    kb_options = caps:escape,ctrl_modifier
    kb_rules =

    repeat_rate = 30
    repeat_delay = 300

    follow_mouse = 0
    # Follow Mouse Cursor
    #    0 - Cursor movement will not change focus.
    #    1 - Cursor movement will always change focus to the window under the cursor.
    #    2 - Cursor focus will be detached from keyboard focus. Clicking on a window will move keyboard focus to that window.
    #    3 - Cursor focus will be completely separate from keyboard focus. Clicking on a window will not change keyboard focus.
    float_switch_override_focus = 0

    accel_profile = adaptive

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    natural_scroll = true
    scroll_method = 2fg
    scroll_factor = 0.8

    touchpad {
        disable_while_typing = false
        natural_scroll = true
        tap_button_map = lrm
        tap-to-click = true
        tap-and-drag = true
        drag_lock = true # Enable drag lock
        scroll_factor = 0.8
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 50
}

group {
    auto_group = true             # 新窗口自动加入当前组
    insert_after_current = false  # 新窗口添加到组末尾
    col.border_active = 0x66ffd700 # 活动组边框颜色（金色）
    col.border_inactive = 0x66ff0000 # 非活动组边框颜色（红色）
    drag_into_group = 2           # 仅拖拽到标题栏时合并
    # 2: 仅拖拽到标题栏时合并
    # 1: 仅拖拽到窗口时合并
    # 0: 仅拖拽到窗口时合并，且不需要按住主修饰键
    # -1: 仅拖拽到窗口时合并，且不需要按住主修饰键
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = ALT, F4, killactive,
bind = $mainMod SHIFT, DELETE, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, S, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $code
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, C, centerwindow,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, SPACE, togglesplit, # dwindle
# use win + shift + r to reload the config
# bind = $mainMod SHIFT, R, reload,

# Example special workspace (scratchpad)
bind = $mainMod, RETURN, togglespecialworkspace, magic
bind = $mainMod SHIFT, RETURN, movetoworkspace, special:magic

# group
bind = $mainMod, G, togglegroup, # toggle group
# remove from group
bind = $mainMod SHIFT, G, moveoutofgroup, # remove from group
bind = $mainMod, TAB, changegroupactive, # change group active


# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# utils
# use mainMod + Shift + S to take a screenshot
# grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot copied to clipboard" -a "ss"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot copied to clipboard" -a "ss"

# use win + V to select from clipboard history
# wl-paste --list | wofi --show dmenu --dmenu-lines 10 --dmenu-columns 1 | wl-paste -i
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, Q, exec, wlogout


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, BACKSLASH, movetoworkspace, emptynm

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Resize active window with mainMod + Shift + arrow keys
binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10

# Resize active window with alt + shift + hjkl
binde = ALT, H, resizeactive, -10 0
binde = ALT, L, resizeactive, 10 0
binde = ALT, K, resizeactive, 0 -10
binde = ALT, J, resizeactive, 0 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$ # that means "float all kitty windows"

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
