// ========== 视觉样式 ==========
background {
    monitor =
    path = ~/dotfiles/config/hypr/background/room-dark.png
    blur_size = 12
    blur_passes = 3
    noise = 0.02
    contrast = 1.2
    brightness = 0.8

    // 添加顶部渐变遮罩
    gradient = 1
    gradient_color = rgba(25, 25, 25, 0.8) 45deg
    gradient_points = 0.0, 0.2, 0.5, 1.0
}

// ========== 时间显示 ==========
// 时间显示
label {
    monitor =
    text = cmd[update:1000] echo "<span font='JetBrains Mono Nerd Font 64' foreground='#e5e9f0'>$(date +'%H:%M')</span>"
    position = 0, -300
}

// 日期显示
label {
    monitor =
    text = cmd[update:10000] echo "<span font='Fira Sans 24' foreground='#88c0d0'>$(date +'%A, %d %B %Y')</span>"
    position = 0, -200
}


// ========== 密码输入框 ==========
input-field {
    monitor =
    size = 400, 60
    outline_thickness = 3
    outer_color = rgba(76, 86, 106, 0.8)
    inner_color = rgba(46, 52, 64, 0.6)
    font_color = rgb(216, 222, 233)

    // 聚焦时动画
    fade_on_empty = true
    placeholder_text = <span foreground="##81a1c1">Enter Password...</span>

    // 输入时波浪效果
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
}
